# .github/workflows/build-image.yml
name: Build & Push Devcontainer Image (codespace_env_implementation)

on:
  push:
    branches: [ codespace_env_implementation ]            
    paths:
      - ".devcontainer/**"
      - "DESCRIPTION"
      - "package_list.txt"
      - "generate_package_list.R"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:               

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/devcontainer

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=codespace_env_implementation
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
