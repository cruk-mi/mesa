name: Build Devcontainer Images

on:
  push:
    branches: [ codespace_env_implementation, dev, main ]
    paths:
      - '.devcontainer/**'
      - 'DESCRIPTION'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [ slim, full ]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push ${{ matrix.variant }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          build-args: |
            VARIANT=${{ matrix.variant }}
          push: true
          tags: |
            ghcr.io/cruk-mi/mesa/devcontainer:${{ matrix.variant == 'slim' && 'codespaces-slim' || 'full' }}
          cache-from: type=registry,ref=ghcr.io/cruk-mi/mesa/devcontainer:cache
          cache-to: type=registry,ref=ghcr.io/cruk-mi/mesa/devcontainer:cache,mode=max

      - name: Tag latest = codespaces-slim
        if: matrix.variant == 'slim'
        run: |
          docker buildx imagetools create -t ghcr.io/cruk-mi/mesa/devcontainer:latest ghcr.io/cruk-mi/mesa/devcontainer:codespaces-slim

